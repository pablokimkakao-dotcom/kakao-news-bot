name: 📰 카카오페이손해보험 뉴스봇

on:
  schedule:
    # 매일 한국시간 오전 8시 (UTC 23시)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 패키지 설치
        run: pip install requests beautifulsoup4 feedparser

      - name: ⚙️ 설정 파일 생성
        run: |
          cat > config.json << 'EOF'
          {
            "company_name": "카카오페이손해보험",
            "keywords": [
              "카카오페이손해보험",
              "카카오페이 손해보험",
              "카카오 손해보험",
              "카카오 보험",
              "카카오페이 보험",
              "카카오",
              "카카오페이",
              "디지털 손해보험",
              "디지털 보험",
              "손해보험",
              "인슈어런스",
              "테크인슈어런스",
              "보험혁신",
              "금감원",
              "금융위",
              "금융감독원",
              "금융위원회",
              "감독당국",
              "한국은행",
              "다이렉트채널",
              "다이렉트 채널",
              "CM채널"
            ],
            "slack_webhook_url": "${{ secrets.SLACK_WEBHOOK_URL }}",
            "github_user": "${{ github.repository_owner }}",
            "github_repo": "kakao-news-bot"
          }
          EOF

      - name: 📰 뉴스 수집 및 HTML 생성
        run: python news_scraper.py

      - name: 🌐 GitHub Pages에 저장
        run: |
          git config user.name "News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/ sent_articles.json
          git diff --staged --quiet || (git commit -m "📰 뉴스 업데이트 $(date +%Y-%m-%d)" && git push)
